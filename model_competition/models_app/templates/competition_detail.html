<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ competition.name }}</title>
</head>
<body>
    <h1>{{ competition.name }}</h1>
    <p>{{ competition.description }}</p>
    <p>Start Date: {{ competition.start_date }}</p>
    <p>End Date: {{ competition.end_date }}</p>

    <h2>Entries</h2>
    <ul>
        {% for entry in entries %}
            <li>{{ entry.profile.user.username }} - <img src="{{ entry.entry_picture.url }}" alt="Entry Picture" width="100"></li>
        {% endfor %}
    </ul>

    <a href="{% url 'create_entry' competition.id %}">Submit an Entry</a>
</body>
</html>
